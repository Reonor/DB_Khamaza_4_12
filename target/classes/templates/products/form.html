<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: pagehead('Товар')}"></head>
<body>
<nav th:replace="~{fragments/layout :: nav}"></nav>
<main class="container narrow">
    <h1 th:text="${editing} ? 'Редагування товару' : 'Новий товар'">Товар</h1>
    <form th:action="@{/products/save}" th:object="${product}" method="post" class="form">
        <input type="hidden" th:field="*{idProduct}"/>
        <input type="hidden" name="editing" th:value="${editing}"/>

        <label>Категорія
            <select th:field="*{categoryNumber}" required>
                <option value="">— оберіть категорію —</option>
                <option th:each="c : ${categories}" th:value="${c.categoryNumber}" th:text="${c.categoryName}">Категорія</option>
            </select>
            <span class="field-error" th:if="${#fields.hasErrors('categoryNumber')}" th:errors="*{categoryNumber}"></span>
        </label>
        <label>Назва
            <input type="text" th:field="*{productName}" required/>
            <span class="field-error" th:if="${#fields.hasErrors('productName')}" th:errors="*{productName}"></span>
        </label>
        <label>Виробник / характеристики
            <input type="text" th:field="*{characteristics}" required/>
            <span class="field-error" th:if="${#fields.hasErrors('characteristics')}" th:errors="*{characteristics}"></span>
        </label>
        <div class="form-actions">
            <button class="btn btn-primary" type="submit">Зберегти</button>
            <a class="btn btn-ghost" th:href="@{/products}">Скасувати</a>
        </div>
    </form>
</main>
</body>
</html>
