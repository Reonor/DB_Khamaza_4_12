spring.application.name=zlagoda-ais
server.port=8080

# ---------------------------------------------------------------------
# DEFAULT (demo) database: H2 in-memory.
# Schema + seed data are created automatically on every startup.
# To use PostgreSQL instead, run with:  --spring.profiles.active=postgres
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:zlagoda;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always
spring.sql.init.platform=h2
spring.sql.init.encoding=UTF-8

# H2 web console at http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:zlagoda)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Thymeleaf
spring.thymeleaf.cache=false

# Render Ukrainian text correctly
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.mvc.format.date=yyyy-MM-dd
