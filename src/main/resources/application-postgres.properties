# ---------------------------------------------------------------------
# PostgreSQL profile.  Activate with:  --spring.profiles.active=postgres
#
# Create the schema once before first run (see README):
#   createdb zlagoda
#   psql -d zlagoda -f src/main/resources/schema-postgresql.sql \
#                   -f src/main/resources/data.sql
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/zlagoda
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema is managed manually via psql, so the app must NOT re-run it.
spring.sql.init.mode=never

spring.thymeleaf.cache=true
